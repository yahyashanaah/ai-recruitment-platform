name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-backend:
    name: Package Backend Artifact
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ai_recruitment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/ai_recruitment/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI contract
        env:
          OPENAI_API_KEY: test-key
          PYTHONPATH: .
        run: python ../../.github/scripts/validate_backend.py

      - name: Create backend bundle
        run: |
          mkdir -p ../../dist
          tar \
            --exclude='.env' \
            --exclude='.venv' \
            --exclude='data' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -czf ../../dist/ai-recruitment-backend.tar.gz \
            .

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-recruitment-backend
          path: dist/ai-recruitment-backend.tar.gz
          if-no-files-found: error

  package-frontend:
    name: Package Frontend Artifact
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build standalone frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Assemble frontend bundle
        run: |
          mkdir -p ../dist/frontend/.next
          cp -r .next/standalone/* ../dist/frontend/
          cp -r .next/static ../dist/frontend/.next/static
          if [ -d public ]; then cp -r public ../dist/frontend/public; fi
          cp package.json ../dist/frontend/package.json

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-recruitment-frontend
          path: dist/frontend
          if-no-files-found: error
